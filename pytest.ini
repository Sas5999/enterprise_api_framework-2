[pytest]
# ============================================================
# Enterprise API Framework — Pytest Configuration
# ============================================================

# ── Output ────────────────────────────────────────────────────────────────────
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes
    --alluredir=allure-results
    --html=reports/report.html
    --self-contained-html
    --timeout=60

# ── Test discovery ────────────────────────────────────────────────────────────
testpaths      = tests
python_files   = test_*.py
python_classes = Test*
python_functions = test_*

# ── Markers ───────────────────────────────────────────────────────────────────
markers =
    smoke:       Fastest subset — run on every commit (< 30 s)
    positive:    Happy-path functional tests
    negative:    Error-handling, boundary, and invalid-input tests
    schema:      JSON-schema contract tests (API drift detection)
    performance: SLA / response-time enforcement tests
    regression:  Full regression sweep
    auth:        Authentication-specific tests
    wip:         Work in progress — excluded from CI by default

# ── Log capturing ─────────────────────────────────────────────────────────────
log_cli              = true
log_cli_level        = INFO
log_cli_format       = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format  = %H:%M:%S

# ── Timeouts ──────────────────────────────────────────────────────────────────
timeout = 60

# ── Parallelism (pytest-xdist) ────────────────────────────────────────────────
# Run with:  pytest -n auto   (uses all CPU cores)
# Or:        pytest -n 4      (fixed 4 workers)
